<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Porządkohol logo">
  <title>Porządkohol</title>
  <defs>
    <linearGradient id="pgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A1F"/>
      <stop offset="100%" stop-color="#E0530C"/>
    </linearGradient>
  </defs>
  <!-- Mark: stylized box being lifted with a small handle / arrow up -->
  <g transform="translate(8 10)">
    <!-- box body -->
    <path d="M6 26 L32 14 L58 26 L58 56 L32 68 L6 56 Z"
          fill="url(#pgrad)" stroke="#1F2937" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- top fold lines -->
    <path d="M6 26 L32 38 L58 26 M32 38 L32 68"
          fill="none" stroke="#1F2937" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- up arrow on the side = "in motion / removed" -->
    <path d="M22 48 L32 40 L42 48 M32 40 L32 56"
          fill="none" stroke="#FFF7ED" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <g font-family="Unbounded, Manrope, system-ui, sans-serif" font-weight="800">
    <text x="84" y="48" font-size="28" fill="#1F2937" letter-spacing="-0.5">porządko<tspan fill="#E0530C">hol</tspan></text>
    <text x="84" y="66" font-size="10" fill="#6B6B73" font-weight="500" letter-spacing="2.4">WYWÓZ &middot; OPRÓŻNIANIE &middot; PORZĄDEK</text>
  </g>
</svg>
