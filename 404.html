<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Przekierowanie...</title>
  <script>
    // Handle /oferta/slug pretty URLs on GitHub Pages
    // GitHub Pages serves 404.html for unknown paths - we use this to route offer detail pages
    (function() {
      var path = window.location.pathname;
      var match = path.match(/^\/oferta\/(.+?)(?:\/)?$/);
      if (match) {
        var slug = decodeURIComponent(match[1]);
        window.location.replace('/oferta.html?slug=' + encodeURIComponent(slug));
      } else {
        // Not an offer URL - show actual 404
        document.title = 'Strona nie znaleziona - MWW Mieszkanie';
        document.getElementById('content').style.display = 'block';
      }
    })();
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; text-align: center; padding: 60px 20px; background: #fafafa; color: #1a1a1a; }
    .box { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    a { color: #2563eb; text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="content" class="box" style="display:none">
    <h1>404</h1>
    <p>Strona, której szukasz, nie istnieje.</p>
    <a href="/">Strona główna</a> &nbsp;|&nbsp; <a href="/oferty.html">Oferty</a>
  </div>
</body>
</html>
